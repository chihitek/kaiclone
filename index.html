  border:2px solid rgba(138,180,255,.55);background:rgba(138,180,255,.08);

const TIME_LIMIT=60*60; // 60秒

//================ 入力 ================
const input={left:false,right:false,jump:false};
let jumpEdge=false, anyTap=false, tapPos=null;
// 画面座標→キャンバス座標（GAME OVER画面のボタン判定用）
function canvasPos(cx,cy){
  const r=cv.getBoundingClientRect();
  return {x:(cx-r.left)*W/r.width, y:(cy-r.top)*H/r.height};
}
function inRect(p,r){
  const PAD=8; // 指の太さぶん当たりを広めに
  return p.x>=r.x-PAD&&p.x<=r.x+r.w+PAD&&p.y>=r.y-PAD&&p.y<=r.y+r.h+PAD;
}
const BTN_CONT={x:48,y:148,w:160,h:28};
const BTN_TITLE={x:48,y:188,w:160,h:28};
const BTN_NORMAL={x:28,y:182,w:92,h:28};
const BTN_ENDLESS={x:136,y:182,w:92,h:28};
function setKey(k,v){
  if(k==="ArrowLeft"||k==="a")input.left=v;
  else if(k==="ArrowRight"||k==="d")input.right=v;
  else if(k===" "||k==="ArrowUp"||k==="z"||k==="w"){
    if(v&&!input.jump)jumpEdge=true;
    input.jump=v;
  }
  if(v)anyTap=true;
}
addEventListener("keydown",e=>{setKey(e.key,true);if([" ","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key))e.preventDefault();});
addEventListener("keyup",e=>setKey(e.key,false));

// ---- 全画面タッチ操作 ----
// 左半分: タッチしてスライド＝バーチャルスティック移動
// 右半分(または2本目の指): タップ＝ジャンプ、おしっぱなし＝ふわふわ
const stickEl=document.getElementById("stick");
const knobEl=document.getElementById("knob");
const jumpfxEl=document.getElementById("jumpfx");
const zonesEl=document.getElementById("zones");
let moveId=null, jumpId=null, originX=0, originY=0;
const DEAD=8, FOLLOW=34, KNOB_MAX=34;

function posStick(x){
  stickEl.style.left=(originX-44)+"px"; stickEl.style.top=(originY-44)+"px";
  const dx=Math.max(-KNOB_MAX,Math.min(KNOB_MAX,x-originX));
  knobEl.style.left=(originX+dx-17)+"px"; knobEl.style.top=(originY-17)+"px";
}
function moveStart(id,x,y){
  moveId=id; originX=x; originY=y;
  stickEl.style.display="block"; knobEl.style.display="block";
  posStick(x);
}
function moveUpdate(x){
  let dx=x-originX;
  // スティック原点が指を追いかける＝すばやい切り返しに対応
  if(dx>FOLLOW){originX=x-FOLLOW;dx=FOLLOW;}
  if(dx<-FOLLOW){originX=x+FOLLOW;dx=-FOLLOW;}
  input.left=dx<-DEAD; input.right=dx>DEAD;
  posStick(x);
}
function moveEnd(){
  moveId=null; input.left=input.right=false;
  stickEl.style.display="none"; knobEl.style.display="none";
}
function jumpStart(id,x,y){
  jumpId=id;
  if(!input.jump)jumpEdge=true;
  input.jump=true;
  jumpfxEl.style.left=(x-32)+"px"; jumpfxEl.style.top=(y-32)+"px";
  jumpfxEl.classList.remove("anim"); void jumpfxEl.offsetWidth; jumpfxEl.classList.add("anim");
}
function jumpEnd(){ jumpId=null; input.jump=false; }

addEventListener("touchstart",e=>{
  e.preventDefault(); initAudio(); anyTap=true;
  const t0=e.changedTouches[0];
  if(t0)tapPos=canvasPos(t0.clientX,t0.clientY);
  for(const t of e.changedTouches){
    if(t.clientX<innerWidth/2 && moveId===null) moveStart(t.identifier,t.clientX,t.clientY);
    else if(jumpId===null) jumpStart(t.identifier,t.clientX,t.clientY);
  }
},{passive:false});
addEventListener("touchmove",e=>{
  e.preventDefault();
  for(const t of e.changedTouches) if(t.identifier===moveId) moveUpdate(t.clientX);
},{passive:false});
function touchDone(e){
  for(const t of e.changedTouches){
    if(t.identifier===moveId) moveEnd();
    if(t.identifier===jumpId) jumpEnd();
  }
}
addEventListener("touchend",touchDone);
addEventListener("touchcancel",touchDone);

// マウス（PC確認用フォールバック）
let mouseMode=null;
addEventListener("mousedown",e=>{
  initAudio(); anyTap=true;
  tapPos=canvasPos(e.clientX,e.clientY);
  if(e.clientX<innerWidth/2){mouseMode="move";moveStart("m",e.clientX,e.clientY);}
  else{mouseMode="jump";jumpStart("m",e.clientX,e.clientY);}
});
addEventListener("mousemove",e=>{ if(mouseMode==="move")moveUpdate(e.clientX); });
addEventListener("mouseup",()=>{
  if(mouseMode==="move")moveEnd(); else if(mouseMode==="jump")jumpEnd();
  mouseMode=null;
});

//================ サウンド ================
let AC=null;
function initAudio(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } if(AC&&AC.state==="suspended")AC.resume(); }
function tone(freq,dur,type="square",vol=0.08,slide=0){
  if(!AC)return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.value=freq;
  if(slide)o.frequency.linearRampToValueAtTime(freq+slide,AC.currentTime+dur);
  g.gain.value=vol;g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.connect(g);g.connect(AC.destination);
  o.start();o.stop(AC.currentTime+dur);
}
const sfx={
  jump:()=>tone(300,0.18,"square",0.06,250),
  float:()=>tone(500,0.05,"square",0.02,40),
  key:()=>{tone(900,0.1,"square",0.07);setTimeout(()=>tone(1350,0.18,"square",0.07),90);},
  door:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.16,"square",0.07),i*110));},
  die:()=>{tone(400,0.5,"sawtooth",0.08,-320);},
  tick:()=>tone(1000,0.04,"square",0.04),
};

//================ ゲーム状態 ================
let state="title"; // title / play / dying / clear / over / ending
let round=0, score=0, hiscore=0, lives=3, timer=0, stateT=0;
let map=[], player=null, enemies=[], keyObj=null, door=null, hasKey=false;
let frame=0, mode="normal"; // normal: 手作り8面 / endless: 自動生成

//================ ステージ自動生成（A案: 到達性保証つき） ================
// 下から上へ「ジャンプで届く間隔」の足場チェーンを作り、P/鍵/扉をその上に置く。
// 最後に BFS で「開始→鍵→扉」が全て到達可能か検証し、ダメなら作り直す＝詰みゼロ。
const REACH_UP=4, REACH_H=4; // 到達判定（保守的: 上方向4タイル・横4タイルまで）
function gSolid(ch){return ch==="#"||ch==="=";}
function gNewGrid(){
  const g=[];
  for(let y=0;y<ROWS;y++){
    const row=[];
    for(let x=0;x<COLS;x++) row.push((x===0||x===COLS-1||y===0||y===ROWS-1)?"#":".");
    g.push(row);
  }
  return g;
}
function gStanding(g,r,c){ // そのセルに立てるか（足元が固体）
  if(r<1||r>=ROWS-1||c<1||c>=COLS-1) return false;
  if(gSolid(g[r][c])) return false;
  return gSolid(g[r+1][c]);
}
function gReach(a,b){
  const dy=a.r-b.r, dx=Math.abs(a.c-b.c);
  if(dy>=0) return dy<=REACH_UP && dx<=REACH_H;   // 同高〜上り
  return dx<=REACH_H+(-dy);                        // 下り（落下中は横に流れる）
}
function gVerify(g){
  let P=null,K=null,D=null;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const ch=g[r][c];
    if(ch==="P")P={r,c};else if(ch==="K")K={r,c};else if(ch==="D")D={r,c};
  }
  if(!P||!K||!D) return false;
  if(!gStanding(g,P.r,P.c)||!gStanding(g,K.r,K.c)||!gStanding(g,D.r,D.c)) return false;
  const stand=[];
  for(let r=1;r<ROWS-1;r++)for(let c=1;c<COLS-1;c++) if(gStanding(g,r,c)) stand.push({r,c});
  const key=p=>p.r*COLS+p.c;
  const seen=new Set([key(P)]), q=[P];
  while(q.length){
    const cur=q.shift();
    for(const s of stand){
      if(seen.has(key(s))) continue;
      if(gReach(cur,s)){ seen.add(key(s)); q.push(s); }
    }
  }
  return seen.has(key(K)) && seen.has(key(D));
}
function gPlatform(g,r,c,len){ for(let i=0;i<len&&c+i<COLS-1;i++) g[r][c+i]="="; }
function generateLevel(round){
  const df=Math.min(round,12); // 難易度（12で頭打ち）
  for(let attempt=0;attempt<300;attempt++){
    const g=gNewGrid();
    const spacing = df>=8?3:2;                          // 段の高低差
    const minLen = Math.max(2,4-Math.floor(df/4));      // 高難度ほど足場が短い
    const maxLen = Math.max(minLen,5-Math.floor(df/4));
    // 下から段を積む
    const tiers=[];
    for(let r=ROWS-2;r>=2&&tiers.length<6;r-=spacing) tiers.push(r);
    // 各段に足場を配置（前段から REACH_H 以内に寄せる＝連結を保証）
    const plats=[]; let prevC=1+Math.floor(Math.random()*6);
    for(let i=0;i<tiers.length;i++){
      const len=minLen+Math.floor(Math.random()*(maxLen-minLen+1));
      let c;
      if(i===0){ c=1+Math.floor(Math.random()*Math.max(1,COLS-2-len)); }
      else{
        const lo=Math.max(1,prevC-REACH_H), hi=Math.min(COLS-1-len,prevC+REACH_H);
        c = lo>=hi?lo:lo+Math.floor(Math.random()*(hi-lo+1));
      }
      gPlatform(g,tiers[i],c,len);
      plats.push({r:tiers[i],c,len}); prevC=c;
    }
    // P / 鍵 / 扉 を足場中央の上に
    const standOf=p=>({r:p.r-1,c:p.c+Math.floor(p.len/2)});
    const ps=standOf(plats[0]);
    const ks=standOf(plats[Math.max(1,Math.floor(plats.length/2))]);
    const ds=standOf(plats[plats.length-1]);
    g[ps.r][ps.c]="P"; g[ks.r][ks.c]="K"; g[ds.r][ds.c]="D";
    // 敵配置（ラウンドでスケール）
    const nEnemies=Math.min(1+Math.floor(round/2),7);
    const used=new Set([ps.r*COLS+ps.c,ks.r*COLS+ks.c,ds.r*COLS+ds.c]);
    let placed=0,guard=0;
    while(placed<nEnemies&&guard++<200){
      const roll=Math.random();
      let type = (df>=4&&roll<0.3)?"c" : (df>=2&&roll<0.6)?"b" : "a";
      if(type==="a"){ // スライムは足場上
        const pl=plats[1+Math.floor(Math.random()*(plats.length-1))];
        const sc={r:pl.r-1,c:pl.c+Math.floor(Math.random()*pl.len)};
        const k=sc.r*COLS+sc.c;
        if(used.has(k)||!gStanding(g,sc.r,sc.c)) continue;
        if(Math.abs(sc.r-ps.r)+Math.abs(sc.c-ps.c)<3) continue; // 開始位置から離す
        g[sc.r][sc.c]="a"; used.add(k); placed++;
      }else{ // バット/ウィスプは空中
        const ar=2+Math.floor(Math.random()*(ROWS-4)), ac=2+Math.floor(Math.random()*(COLS-4));
        const k=ar*COLS+ac;
        if(used.has(k)||g[ar][ac]!==".") continue;
        if(Math.abs(ar-ps.r)+Math.abs(ac-ps.c)<4) continue;
        g[ar][ac]=type; used.add(k); placed++;
      }
    }
    if(gVerify(g)) return g.map(row=>row.join(""));
  }
  return LEVELS[round%LEVELS.length]; // 念のためのフォールバック
}

let endlessSrc=null; // endless: 現ラウンドの生成結果をキャッシュ（やられ・継続では作り直さない）
function loadLevel(n,regen){
  let src;
  if(mode==="endless"){
    if(regen||!endlessSrc) endlessSrc=generateLevel(n); // 新ラウンド時のみ生成
    src=endlessSrc;
  }else src=LEVELS[n];
  map=src.map(r=>r.split(""));
  enemies=[];keyObj=null;door=null;hasKey=false;timer=TIME_LIMIT;
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    const c=map[y][x], px=x*TILE, py=y*TILE;
    if(c==="P"){player=makePlayer(px+3,py+2);map[y][x]=".";}
    else if(c==="K"){keyObj={x:px+4,y:py+4,w:8,h:8,taken:false};map[y][x]=".";}
    else if(c==="D"){door={x:px+2,y:py,w:12,h:16};map[y][x]=".";}
    else if(c==="a"){enemies.push({type:"a",x:px+3,y:py+6,w:10,h:10,vx:0.5,t:0});map[y][x]=".";}
    else if(c==="b"){enemies.push({type:"b",x:px+3,y:py+3,w:10,h:10,vy:0.6,baseX:px+3,t:0});map[y][x]=".";}
    else if(c==="c"){enemies.push({type:"c",x:px+4,y:py+4,w:9,h:9,vx:0,vy:0,t:0});map[y][x]=".";}
  }
}
function makePlayer(x,y){
  return {x,y,w:10,h:14,vx:0,vy:0,face:1,onGround:false,rise:0,canJump:false,anim:0};
}

//================ 当たり判定 ================
function solid(c){return c==="#"||c==="=";}
function tileAt(px,py){
  const tx=Math.floor(px/TILE), ty=Math.floor(py/TILE);
  if(tx<0||tx>=COLS||ty<0||ty>=ROWS)return "#";
  return map[ty][tx];
}
function rectHitsSolid(x,y,w,h){
  return solid(tileAt(x,y))||solid(tileAt(x+w-1,y))||
         solid(tileAt(x,y+h-1))||solid(tileAt(x+w-1,y+h-1))||
         solid(tileAt(x,y+h/2))||solid(tileAt(x+w-1,y+h/2));
}
function overlap(a,b,pad){
  pad=pad||0;
  return a.x+pad<b.x+b.w && a.x+a.w-pad>b.x && a.y+pad<b.y+b.h && a.y+a.h-pad>b.y;
}

//================ プレイヤー更新 ================
const GRAV=0.07, MAXFALL=1.4, MOVE=1.1, ACC=0.12, AIRACC=0.09, AIRTURN=2.2, JUMP=2.0, LIFT=0.115, LIFT_MAX=24;
function updatePlayer(p){
  // 横移動（空中はやや弱め＋逆方向への切り返しは強めに補助）
  let acc=p.onGround?ACC:AIRACC;
  if(!p.onGround&&((input.left&&p.vx>0)||(input.right&&p.vx<0)))acc*=AIRTURN;
  if(input.left){p.vx-=acc;p.face=-1;}
  else if(input.right){p.vx+=acc;p.face=1;}
  else if(p.onGround){p.vx*=0.75;if(Math.abs(p.vx)<0.05)p.vx=0;}
  p.vx=Math.max(-MOVE,Math.min(MOVE,p.vx));

  // ジャンプ：押した瞬間に上昇開始、押し続けるとふわふわ上昇
  if(jumpEdge&&p.onGround){
    p.vy=-JUMP;p.rise=0;p.onGround=false;sfx.jump();
  }
  if(input.jump&&p.vy<0&&p.rise<LIFT_MAX){
    p.vy-=LIFT;p.rise++;
    if(p.rise%6===0)sfx.float();
  }
  // 重力（ゆっくり落下）
  p.vy+=GRAV;
  if(p.vy>MAXFALL)p.vy=MAXFALL;

  // X移動
  let nx=p.x+p.vx;
  if(rectHitsSolid(nx,p.y,p.w,p.h)){
    while(!rectHitsSolid(p.x+Math.sign(p.vx),p.y,p.w,p.h)&&Math.abs(p.vx)>0.01)p.x+=Math.sign(p.vx);
    p.vx=0;
  }else p.x=nx;

  // Y移動
  let ny=p.y+p.vy;
  if(rectHitsSolid(p.x,ny,p.w,p.h)){
    if(p.vy>0)p.onGround=true;
    while(!rectHitsSolid(p.x,p.y+Math.sign(p.vy),p.w,p.h)&&Math.abs(p.vy)>0.01)p.y+=Math.sign(p.vy);
    p.vy=0;
  }else{p.y=ny;p.onGround=false;}

  if(Math.abs(p.vx)>0.1&&p.onGround)p.anim+=0.18;

  // 鍵
  if(keyObj&&!keyObj.taken&&overlap(p,keyObj)){
    keyObj.taken=true;hasKey=true;score+=200;sfx.key();
  }
  // 扉
  if(door&&hasKey&&overlap(p,door,2)){
    state="clear";stateT=0;score+=Math.floor(timer/60)*10;sfx.door();
  }
}

//================ 敵更新 ================
function updateEnemies(){
  for(const e of enemies){
    e.t++;
    if(e.type==="a"){ // スライム：床の上を往復
      let nx=e.x+e.vx;
      const footY=e.y+e.h+1;
      const aheadX=e.vx>0?nx+e.w:nx;
      if(rectHitsSolid(nx,e.y,e.w,e.h)||!solid(tileAt(aheadX,footY))){
        e.vx=-e.vx;
      }else e.x=nx;
      // 重力（足場がなければ落ちる）
      if(!rectHitsSolid(e.x,e.y+1,e.w,e.h))e.y+=1;
    }else if(e.type==="b"){ // バット：縦に往復＋揺れ
      let ny=e.y+e.vy;
      if(rectHitsSolid(e.x,ny,e.w,e.h)||ny<TILE||ny>H-HUD)e.vy=-e.vy;
      else e.y=ny;
      e.x=e.baseX+Math.sin(e.t*0.05)*6;
    }else if(e.type==="c"){ // ウィスプ：ゆっくり追尾（壁を抜ける）
      const sp=0.0075;
      e.vx+=Math.sign(player.x-e.x)*sp;
      e.vy+=Math.sign(player.y-e.y)*sp;
      e.vx=Math.max(-0.4,Math.min(0.4,e.vx));
      e.vy=Math.max(-0.4,Math.min(0.4,e.vy));
      e.x+=e.vx;e.y+=e.vy;
    }
    if(state==="play"&&overlap(player,e,2)){killPlayer();}
  }
}
function killPlayer(){
  state="dying";stateT=0;sfx.die();
}

//================ メイン更新 ================
function startGame(m){ mode=m; round=0; score=0; lives=3; loadLevel(0,true); state="play"; frame=0; }
function update(){
  frame++;
  if(state==="title"){
    if(frame>10){
      if(anyTap&&tapPos){
        if(inRect(tapPos,BTN_NORMAL)) startGame("normal");
        else if(inRect(tapPos,BTN_ENDLESS)) startGame("endless");
      }else if(jumpEdge){ startGame("normal"); } // キーボード既定
    }
  }else if(state==="play"){
    timer--;
    if(timer===600||timer===420||timer===240||timer===60)sfx.tick();
    if(timer<=0){killPlayer();return;}
    updatePlayer(player);
    updateEnemies();
  }else if(state==="dying"){
    stateT++;
    player.y-=0.4; // ふわっと昇天
    if(stateT>80){
      lives--;
      if(lives<0){state="over";stateT=0;hiscore=Math.max(hiscore,score);}
      else{loadLevel(round);state="play";}
    }
  }else if(state==="clear"){
    stateT++;
    if(stateT>110){
      round++;
      if(mode==="normal"&&round>=LEVELS.length){state="ending";stateT=0;hiscore=Math.max(hiscore,score);}
      else{loadLevel(round,true);state="play";} // クリア→次ラウンドは新規生成
    }
  }else if(state==="over"){
    stateT++;
    if(stateT>30){
      if(anyTap&&tapPos){
        if(inRect(tapPos,BTN_CONT)){lives=3;loadLevel(round);state="play";sfx.door();}
        else if(inRect(tapPos,BTN_TITLE)){state="title";frame=0;}
      }else if(jumpEdge){ // キーボード用: ジャンプキーでコンティニュー
        lives=3;loadLevel(round);state="play";sfx.door();
      }
    }
  }else if(state==="ending"){
    stateT++;
    if(anyTap&&stateT>60){state="title";frame=0;}
  }
  anyTap=false;jumpEdge=false;tapPos=null;
}

//================ 描画 ================
function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),w,h);}

function drawTiles(){
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    const c=map[y][x], dx=x*TILE, dy=HUD+y*TILE;
    if(c==="#"){ // ドルアーガ風の青レンガ
      px(dx,dy,TILE,TILE,"#1c3a8c");
      ctx.fillStyle="#3458c8";
      ctx.fillRect(dx+1,dy+1,6,6);ctx.fillRect(dx+9,dy+1,6,6);
      ctx.fillRect(dx+1,dy+9,14,6);
    }else if(c==="="){
      px(dx,dy,TILE,TILE,"#7a5a20");
      ctx.fillStyle="#c89a40";
      ctx.fillRect(dx+1,dy+1,14,6);
      ctx.fillStyle="#a87c30";
      ctx.fillRect(dx+1,dy+9,14,6);
    }
  }
}
function drawKai(p){
  const x=Math.round(p.x)-3, y=Math.round(p.y+HUD)-1;
  const blink=(state==="dying"&&Math.floor(stateT/4)%2===0);
  if(blink)return;
  // 髪（赤茶）＋ティアラ
  px(x+3,y,10,3,"#c84818");
  px(x+4,y,8,1,"#f8d870");
  // 顔
  px(x+4,y+3,8,3,"#f8c8a0");
  px(p.face>0?x+9:x+5,y+3,2,2,"#202020"); // 目
  // ドレス（白＋ピンク）
  px(x+4,y+6,8,5,"#f8f8f8");
  px(x+4,y+9,8,2,"#e858a0");
  px(x+2,y+6,2,3,"#f8c8a0"); // 腕
  px(x+12,y+6,2,3,"#f8c8a0");
  // 足（歩きアニメ）
  const step=Math.floor(p.anim)%2===0;
  if(p.onGround&&Math.abs(p.vx)>0.1){
    px(x+(step?4:7),y+11,3,3,"#f8c8a0");
    px(x+(step?9:5),y+12,3,2,"#f8c8a0");
  }else if(!p.onGround){
    px(x+5,y+11,3,2,"#f8c8a0");px(x+9,y+11,3,2,"#f8c8a0");
  }else{
    px(x+5,y+11,3,3,"#f8c8a0");px(x+9,y+11,3,3,"#f8c8a0");
  }
}
function drawEnemies(){
  for(const e of enemies){
    const x=Math.round(e.x),y=Math.round(e.y)+HUD;
    if(e.type==="a"){ // スライム
      const sq=Math.sin(e.t*0.15)*1.5;
      px(x,y+2+sq,10,8-sq,"#30c030");
      px(x+1,y+sq,8,3,"#50e050");
      px(x+2,y+3+sq,2,2,"#fff");px(x+6,y+3+sq,2,2,"#fff");
      px(x+3,y+4+sq,1,1,"#000");px(x+7,y+4+sq,1,1,"#000");
    }else if(e.type==="b"){ // バット
      const fl=Math.floor(e.t/8)%2===0;
      px(x+2,y+2,6,6,"#9040d0");
      if(fl){px(x-2,y,4,4,"#b060f0");px(x+8,y,4,4,"#b060f0");}
      else{px(x-2,y+4,4,4,"#b060f0");px(x+8,y+4,4,4,"#b060f0");}
      px(x+3,y+4,1,2,"#ffe060");px(x+6,y+4,1,2,"#ffe060");
    }else{ // ウィスプ
      const r=4+Math.sin(e.t*0.2)*1.5;
      ctx.fillStyle="rgba(80,220,255,0.35)";
      ctx.beginPath();ctx.arc(x+4,y+4,r+3,0,7);ctx.fill();
      ctx.fillStyle="#50dcff";
      ctx.beginPath();ctx.arc(x+4,y+4,r,0,7);ctx.fill();
      ctx.fillStyle="#fff";
      ctx.beginPath();ctx.arc(x+4,y+4,r-2.5,0,7);ctx.fill();
    }
  }
}
function drawKeyDoor(){
  if(door){
    const x=door.x,y=door.y+HUD;
    px(x,y,12,16,hasKey?"#d8a030":"#684830");
    px(x+2,y+2,8,12,hasKey?"#f8e890":"#403020");
    px(x+5,y+7,2,3,hasKey?"#806020":"#c8a868");
    if(hasKey&&frame%30<15){ctx.strokeStyle="#fff";ctx.strokeRect(x-1.5,y-1.5,15,19);}
  }
  if(keyObj&&!keyObj.taken){
    const x=keyObj.x,y=keyObj.y+HUD+Math.sin(frame*0.08)*2;
    px(x,y,5,5,"#ffd020");px(x+1.5,y+1.5,2,2,"#806000");
    px(x+4,y+2,5,2,"#ffd020");px(x+7,y+3,2,2,"#ffd020");
  }
}
function drawButton(r,label,hl){
  px(r.x,r.y,r.w,r.h,hl?"#2a3c6e":"#16203e");
  ctx.strokeStyle=hl?"#ffd166":"#4a5a8a";
  ctx.strokeRect(r.x+0.5,r.y+0.5,r.w-1,r.h-1);
  text(label,r.x+r.w/2,r.y+r.h/2+3,"#fff",9,"center");
}
function text(s,x,y,c,size,align){
  ctx.fillStyle=c||"#fff";
  ctx.font=(size||8)+'px "DotGothic16",monospace';
  ctx.textAlign=align||"left";
  ctx.fillText(s,x,y);
  ctx.textAlign="left";
}
function drawHUD(){
  px(0,0,W,HUD,"#101018");
  text((mode==="endless"?"ENDLESS ":"ROUND ")+(round+1),6,12,"#8ab4ff",8);
  text("SCORE "+score,6,26,"#fff",8);
  // 残機
  for(let i=0;i<lives;i++){px(96+i*12,18,8,8,"#e858a0");px(97+i*12,16,6,3,"#c84818");}
  // タイマーバー
  text("TIME",150,12,"#aaa",8);
  const tw=Math.max(0,Math.floor(70*timer/TIME_LIMIT));
  px(184,5,72,9,"#303030");
  px(185,6,tw,7,timer<600?(frame%20<10?"#ff4040":"#ff8040"):"#40c040");
  if(keyObj&&keyObj.taken){px(152,18,5,5,"#ffd020");px(156,20,6,2,"#ffd020");text("GET!",166,26,"#ffd020",8);}
}
function drawTitle(){
  px(0,0,W,H,"#000");
  // 塔のシルエット
  ctx.fillStyle="#16235a";
  for(let i=0;i<7;i++)ctx.fillRect(98+i%2*4,40+i*24,60-i%2*8,24);
  ctx.fillStyle="#2a3c8a";
  ctx.fillRect(108,30,40,14);
  text("塔の少女 KAI",W/2,86,"#ffd166",20,"center");
  text("- カイの冒険風アクション -",W/2,104,"#8ab4ff",9,"center");
  text("カギを とって トビラへ いそげ!",W/2,128,"#fff",9,"center");
  text("ひだり: スライドいどう / みぎ: タップでジャンプ",W/2,146,"#aaa",7,"center");
  text("ながおしで ふわふわ うかぶよ",W/2,162,"#ffd166",8,"center");
  // モード選択ボタン
  drawButton(BTN_NORMAL,"NORMAL",frame%60<30);
  drawButton(BTN_ENDLESS,"ENDLESS",frame%60<30);
  text("ぜん8面",BTN_NORMAL.x+BTN_NORMAL.w/2,BTN_NORMAL.y+40,"#777",7,"center");
  text("むげん自動生成",BTN_ENDLESS.x+BTN_ENDLESS.w/2,BTN_ENDLESS.y+40,"#777",7,"center");
  text("HI-SCORE "+hiscore,W/2,234,"#666",8,"center");
}
function draw(){
  px(0,0,W,H,"#000");
  if(state==="title"){drawTitle();return;}
  if(state==="over"){
    text("GAME OVER",W/2,76,"#ff5050",18,"center");
    text("SCORE "+score,W/2,102,"#fff",10,"center");
    text("HI-SCORE "+hiscore,W/2,118,"#ffd166",10,"center");
    if(stateT>30){
      drawButton(BTN_CONT,"CONTINUE - ROUND "+(round+1),frame%60<30);
      drawButton(BTN_TITLE,"TITLE",false);
    }
    return;
  }
  if(state==="ending"){
    text("CONGRATULATIONS!",W/2,80,"#ffd166",14,"center");
    text("カイは とうの ちょうじょうで",W/2,110,"#fff",9,"center");
    text("ブルークリスタルロッドを 見つけた!",W/2,126,"#fff",9,"center");
    text("SCORE "+score,W/2,156,"#8ab4ff",10,"center");
    if(stateT>60&&frame%60<36)text("TAP TO TITLE",W/2,196,"#aaa",9,"center");
    return;
  }
  drawTiles();
  drawKeyDoor();
  drawEnemies();
  drawKai(player);
  drawHUD();
  if(state==="clear"){
    px(48,100,160,40,"rgba(0,0,0,0.7)");
    text("ROUND CLEAR!",W/2,118,"#ffd166",13,"center");
    text("TIME BONUS +"+Math.floor(timer/60)*10,W/2,132,"#fff",8,"center");
  }
  // 最初のラウンドだけ画面に操作ゾーンのガイドを重ねる
  if(state==="play"&&round===0&&frame<300) zonesEl.classList.add("show");
  else zonesEl.classList.remove("show");
}

//================ ループ ================
let last=0,acc=0;
const STEP=1000/60;
function loop(t){
  requestAnimationFrame(loop);
  if(!last)last=t;
  acc+=Math.min(t-last,100);last=t;
  while(acc>=STEP){update();acc-=STEP;}
  draw();
}
requestAnimationFrame(loop);
</script>
